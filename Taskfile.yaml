---
version: 3
includes:
  git:
    taskfile: https://raw.githubusercontent.com/stuttgart-things/tasks/refs/heads/main/git/git.yaml

dotenv: ['.env', '{{.HOME}}/.env']

vars:
  DAGGER_GO_MODULE: github.com/stuttgart-things/dagger/go@v0.103.0
  DAGGER_TRIVY_MODULE: github.com/stuttgart-things/dagger/trivy@v0.103.0
  KO_VERSION: 1c688bd6325d7b041fdc7d1be092f96054c35d39  # pragma: allowlist secret

tasks:
  do:
    desc: Select a task to run
    cmds:
      - |
        # Extract task names (keep internal colons, remove only trailing colon)
        task_name=$(task -l | awk '/^\*/ {print $2}' | sed 's/:$//' | gum choose)

        # Run the selected task
        [ -n "$task_name" ] && task "$task_name"

  default:
    desc: List available tasks
    cmds:
      - task --list

  security-scan:
    desc: Run gosec via Dagger against a workflow dir (requires SOURCE_CODE_DIR)
    requires:
      vars: [SOURCE_CODE_DIR]
    vars:
      PROJECT: 'dapr-{{ base .SOURCE_CODE_DIR }}'
      SECURE_GO_VERSION: '{{ .SECURE_GO_VERSION | default "2.24.6" }}'
      REPORT: '/tmp/security-report-{{ .PROJECT }}.txt'
    cmds:
      - |
        echo "Running gosec on {{ .SOURCE_CODE_DIR }} (gosec {{ .SECURE_GO_VERSION }})"

        dagger call -m {{ .DAGGER_GO_MODULE }} security-scan \
          --src "{{ .SOURCE_CODE_DIR }}" \
          --secure-go-version "{{ .SECURE_GO_VERSION }}" \
          --progress plain \
          export --path="{{ .REPORT }}"

        echo ""
        echo "Report: {{ .REPORT }}"
        tail -20 "{{ .REPORT }}"

  trivy-scan-image:
    desc: Trivy-scan an already-pushed image via Dagger (requires IMAGE_REF)
    requires:
      vars: [IMAGE_REF]
    vars:
      SEVERITY: '{{ .SEVERITY | default "HIGH,CRITICAL" }}'
      REPORT: '/tmp/trivy-scan-{{ .IMAGE_REF | replace "/" "_" | replace ":" "_" }}.json'
    cmds:
      - |
        echo "Scanning {{ .IMAGE_REF }} (severity: {{ .SEVERITY }})"

        dagger call -m {{ .DAGGER_TRIVY_MODULE }} scan-image \
          --image-ref "{{ .IMAGE_REF }}" \
          --severity "{{ .SEVERITY }}" \
          --progress plain \
          export --path="{{ .REPORT }}"

        echo "Report: {{ .REPORT }}"

  pipeline:
    desc: Run the full gosec + ko-build + trivy pipeline (mirrors the GH orchestrator — requires SOURCE_CODE_DIR)
    requires:
      vars: [SOURCE_CODE_DIR]
    vars:
      SECURE_GO_VERSION: '{{ .SECURE_GO_VERSION | default "2.24.6" }}'
    cmds:
      - task: security-scan
        vars:
          SOURCE_CODE_DIR: '{{ .SOURCE_CODE_DIR }}'
          SECURE_GO_VERSION: '{{ .SECURE_GO_VERSION }}'
      - task: build-scan-image-ko
        vars: {SOURCE_CODE_DIR: '{{ .SOURCE_CODE_DIR }}'}

  build-scan-image-ko:
    desc: Build, push to ttl.sh and scan a workflow container image with ko (requires SOURCE_CODE_DIR)
    requires:
      vars: [SOURCE_CODE_DIR]
    vars:
      PROJECT: 'dapr-{{ base .SOURCE_CODE_DIR }}'
    cmds:
      - |
        RANDOM_TAG=$(openssl rand -hex 6)
        REPO_NAME="ttl.sh/{{ .PROJECT }}-${RANDOM_TAG}"

        echo "Building and pushing to: ${REPO_NAME}"

        IMAGE_REF=$(dagger call -m {{ .DAGGER_GO_MODULE }} ko-build \
          --src "{{ .SOURCE_CODE_DIR }}" \
          --repo "$REPO_NAME" \
          --push="true" \
          --ko-version="{{ .KO_VERSION }}" \
          --progress plain)

        echo "Image pushed: $IMAGE_REF"
        echo "Scanning with Trivy..."

        dagger call -m {{ .DAGGER_TRIVY_MODULE }} scan-image \
          --image-ref "$IMAGE_REF" \
          --severity "HIGH,CRITICAL" \
          --progress plain \
          export --path=/tmp/trivy-scan-{{ .PROJECT }}.json

        echo "Build and scan complete!"
        echo "Image: $IMAGE_REF"
        echo "Scan Report: /tmp/trivy-scan-{{ .PROJECT }}.json"

        # Filter the summary through an optional .trivyignore in the workflow dir.
        # Format: one CVE id per line, '#' comments allowed.
        IGNORE_FILE="{{ .SOURCE_CODE_DIR }}/.trivyignore"
        IGNORED=""
        if [ -f "$IGNORE_FILE" ]; then
          IGNORED=$(grep -Ev '^\s*(#|$)' "$IGNORE_FILE" | tr '\n' ' ')
          echo "Ignoring CVEs from $IGNORE_FILE: ${IGNORED:-<none>}"
        fi

        if command -v jq &> /dev/null; then
          echo ""
          IGNORED="$IGNORED" jq -r '
            ($ENV.IGNORED | split(" ") | map(select(length > 0))) as $ignored |
            .Results[]?
            | .Target as $t
            | (.Vulnerabilities // [] | map(select(.VulnerabilityID as $id | ($ignored | index($id)) | not))) as $vulns
            | "\($t): \($vulns | length) vulnerabilities"
          ' /tmp/trivy-scan-{{ .PROJECT }}.json 2>/dev/null \
            || echo "No HIGH/CRITICAL vulnerabilities found!"
        fi

        # Interactive ignore: if gum is present and there are non-ignored vulns,
        # let the user multi-select CVEs to add to .trivyignore.
        if command -v gum &> /dev/null && command -v jq &> /dev/null; then
          ROWS=$(IGNORED="$IGNORED" jq -r '
            ($ENV.IGNORED | split(" ") | map(select(length > 0))) as $ignored |
            .Results[]?
            | .Vulnerabilities // []
            | map(select(.VulnerabilityID as $id | ($ignored | index($id)) | not))
            | .[]
            | "\(.VulnerabilityID)\t\(.Severity)\t\(.PkgName)\t\(.Title // "")"
          ' /tmp/trivy-scan-{{ .PROJECT }}.json 2>/dev/null)

          if [ -n "$ROWS" ]; then
            echo ""
            SELECTED=$(echo "$ROWS" | awk -F'\t' '{printf "%s  [%s]  %s — %s\n", $1, $2, $3, $4}' \
              | gum choose --no-limit --header="Select CVEs to add to .trivyignore (space to toggle, enter to confirm, esc to skip):" \
              || true)

            if [ -n "$SELECTED" ]; then
              mkdir -p "{{ .SOURCE_CODE_DIR }}"
              echo "$SELECTED" | awk '{print $1}' >> "$IGNORE_FILE"
              # dedupe + preserve existing comments
              TMP=$(mktemp)
              awk '!seen[$0]++' "$IGNORE_FILE" > "$TMP" && mv "$TMP" "$IGNORE_FILE"
              echo ""
              echo "Updated $IGNORE_FILE:"
              cat "$IGNORE_FILE"
            fi
          fi
        fi

  trigger:
    desc: Pick a workflow + input.json via gum, prompt for DAPR_HTTP_PORT and run ./run.sh
    cmds:
      - |
        if ! command -v gum &> /dev/null; then
          echo "gum not found — install from https://github.com/charmbracelet/gum"
          exit 1
        fi

        mapfile -t DIRS < <(find workflows -mindepth 2 -maxdepth 2 -name run.sh -printf '%h\n' | sort -u)
        if [ ${#DIRS[@]} -eq 0 ]; then
          echo "no workflows with run.sh found under workflows/"
          exit 1
        fi

        TARGET=$(printf '%s\n' "${DIRS[@]}" | gum choose --header="Select workflow:")
        [ -z "$TARGET" ] && { echo "no selection"; exit 1; }

        mapfile -t INPUTS < <(cd "$TARGET" && ls input*.json 2>/dev/null | sort)
        if [ ${#INPUTS[@]} -eq 0 ]; then
          echo "no input*.json files found in $TARGET"
          exit 1
        fi

        INPUT=$(printf '%s\n' "${INPUTS[@]}" | gum choose --header="Select input file:")
        [ -z "$INPUT" ] && { echo "no selection"; exit 1; }

        PORT=$(gum input --header="DAPR_HTTP_PORT" --value="3510" --placeholder="3510")
        [ -z "$PORT" ] && { echo "no port"; exit 1; }

        echo "→ cd $TARGET && DAPR_HTTP_PORT=$PORT ./run.sh $INPUT"
        cd "$TARGET" && DAPR_HTTP_PORT="$PORT" ./run.sh "$INPUT"

  run-backstage-tpl:
    desc: Start the backstage-template-execution worker via dapr run (override HTTP_PORT / GRPC_PORT to avoid clashes)
    dir: workflows/backstage-template-execution
    vars:
      APP_ID: '{{ .APP_ID | default "backstage-template-execution" }}'
      HTTP_PORT: '{{ .HTTP_PORT | default "3510" }}'
      GRPC_PORT: '{{ .GRPC_PORT | default "50011" }}'
    cmds:
      - |
        echo "Starting dapr run — app={{ .APP_ID }} http={{ .HTTP_PORT }} grpc={{ .GRPC_PORT }}"
        echo "Shell 2: export DAPR_HTTP_PORT={{ .HTTP_PORT }} && ./run.sh <input.json>"
        dapr run \
          --app-id {{ .APP_ID }} \
          --app-protocol grpc \
          --dapr-grpc-port {{ .GRPC_PORT }} \
          --dapr-http-port {{ .HTTP_PORT }} \
          -- go run .

  build:
    desc: Interactively choose a workflow + action (gosec / build / pipeline) — requires gum
    cmds:
      - |
        if ! command -v gum &> /dev/null; then
          echo "gum not found — install from https://github.com/charmbracelet/gum"
          exit 1
        fi

        # discover workflow folders under workflows/ (any dir containing go.mod)
        mapfile -t DIRS < <(find workflows -mindepth 2 -maxdepth 2 -name go.mod -printf '%h\n' \
          | sort -u)

        if [ ${#DIRS[@]} -eq 0 ]; then
          echo "no workflow folders with a go.mod found under workflows/"
          exit 1
        fi

        TARGET=$(printf '%s\n' "${DIRS[@]}" | gum choose --header="Select workflow:")
        [ -z "$TARGET" ] && { echo "no selection"; exit 1; }

        ACTION=$(printf '%s\n' \
          "pipeline (gosec + ko-build + trivy)" \
          "security-scan (gosec only)" \
          "build-scan-image-ko (ko-build + trivy)" \
          | gum choose --header="Select action:")
        [ -z "$ACTION" ] && { echo "no selection"; exit 1; }

        case "$ACTION" in
          pipeline*)          task pipeline SOURCE_CODE_DIR="./$TARGET" ;;
          security-scan*)     task security-scan SOURCE_CODE_DIR="./$TARGET" ;;
          build-scan-image*)  task build-scan-image-ko SOURCE_CODE_DIR="./$TARGET" ;;
        esac
