---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: golden-image
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis-stack.homerun2-flux.svc.cluster.local:6379
    - name: redisPassword
      secretKeyRef:
        name: redis-password
        key: password
    - name: actorStateStore
      value: "true"
